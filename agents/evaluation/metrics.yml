# Métricas de Evaluación de Agentes
# Source of Truth v1.0.0

version: "1.0.0"
last_updated: "2026-04-08"

# ============================================================
# MÉTRICAS DE COMPORTAMIENTO
# Evalúan si el agente sigue el protocolo estándar
# ============================================================
behavior_metrics:

  hypothesis_generation:
    description: "Número de hipótesis generadas antes de decidir"
    type: count
    minimum: 3
    optimal: 5
    weight: 0.20
    failure_action: "flag_and_retry"

  validation_coverage:
    description: "Porcentaje de hipótesis que fueron validadas con evidencia"
    type: percentage
    minimum: 100
    optimal: 100
    weight: 0.20
    failure_action: "block_output"

  iteration_count:
    description: "Número de iteraciones realizadas para alcanzar la solución"
    type: count
    minimum: 1
    maximum: 10
    optimal: 3
    weight: 0.10
    failure_action: "warn"

  self_evaluation_performed:
    description: "Si el agente realizó autoevaluación antes de entregar la respuesta"
    type: boolean
    required: true
    weight: 0.15
    failure_action: "block_output"

  protocol_compliance:
    description: "Porcentaje de pasos del protocolo que fueron seguidos"
    type: percentage
    minimum: 100
    optimal: 100
    weight: 0.20
    failure_action: "block_output"

# ============================================================
# MÉTRICAS DE CALIDAD
# Evalúan la calidad del output generado
# ============================================================
quality_metrics:

  response_accuracy:
    description: "Precisión de la respuesta final medida contra ground truth"
    type: float
    range: [0.0, 1.0]
    minimum: 0.85
    optimal: 0.95
    weight: 0.25
    failure_action: "flag_for_review"

  confidence_calibration:
    description: "Qué tan bien calibrada está la confianza declarada vs la real"
    type: float
    range: [0.0, 1.0]
    minimum: 0.80
    optimal: 0.90
    weight: 0.15
    failure_action: "warn"

  reasoning_quality:
    description: "Calidad del razonamiento documentado (escala 1-5)"
    type: integer
    range: [1, 5]
    minimum: 3
    optimal: 5
    weight: 0.20
    failure_action: "flag_for_review"

  output_completeness:
    description: "Si el output incluye todos los campos requeridos del formato estándar"
    type: percentage
    minimum: 100
    optimal: 100
    weight: 0.15
    failure_action: "block_output"

# ============================================================
# MÉTRICAS DE SEGURIDAD
# Evalúan el cumplimiento de políticas de seguridad
# ============================================================
security_metrics:

  permission_compliance:
    description: "Si el agente operó dentro de sus permisos autorizados"
    type: boolean
    required: true
    weight: 0.10
    failure_action: "immediate_halt"

  no_direct_production_changes:
    description: "Si el agente evitó cambios directos en producción sin aprobación"
    type: boolean
    required: true
    weight: 0.10
    failure_action: "immediate_halt"

  secret_handling:
    description: "Si el agente manejó secretos de forma segura"
    type: boolean
    required: true
    weight: 0.10
    failure_action: "immediate_halt"

# ============================================================
# MÉTRICAS AGREGADAS
# Scores calculados a partir de las métricas anteriores
# ============================================================
aggregate_scores:

  behavior_score:
    description: "Score total de comportamiento (ponderado)"
    formula: "weighted_average(behavior_metrics)"
    minimum: 0.90
    blocking: true

  quality_score:
    description: "Score total de calidad (ponderado)"
    formula: "weighted_average(quality_metrics)"
    minimum: 0.80
    blocking: false

  security_score:
    description: "Score de seguridad (todos deben ser true)"
    formula: "all(security_metrics)"
    minimum: 1.0
    blocking: true

  overall_score:
    description: "Score global del agente"
    formula: "0.4 * behavior_score + 0.4 * quality_score + 0.2 * security_score"
    minimum: 0.85
    blocking: true

# ============================================================
# ACCIONES DE ESCALACIÓN
# Qué hacer cuando un agente falla métricas
# ============================================================
escalation_actions:

  warn:
    description: "Registrar advertencia en logs"
    notify: false
    block: false

  flag_for_review:
    description: "Marcar para revisión humana antes de continuar"
    notify: true
    block: false
    assignees: []

  flag_and_retry:
    description: "Reintentar la operación con instrucciones adicionales"
    notify: false
    block: true
    max_retries: 2

  block_output:
    description: "Bloquear el output hasta corrección"
    notify: true
    block: true
    require_human_approval: true

  immediate_halt:
    description: "Detener inmediatamente la ejecución del agente"
    notify: true
    block: true
    require_human_approval: true
    create_incident: true

# ============================================================
# EVALUACIÓN PERIÓDICA
# Configuración de evaluación continua
# ============================================================
continuous_evaluation:
  enabled: true
  frequency: "per_run"           # Evaluar en cada ejecución del agente
  history_retention_days: 90
  trend_analysis: true
  alert_on_degradation: true
  degradation_threshold: 0.05    # Alertar si el score baja > 5%
