# Pipeline de Gobernanza — Source of Truth v1.0.0
# Auditoría automática y gestión de conformidad del ecosistema

name: "🏛️ Governance & Audit"

on:
  schedule:
    - cron: "0 2 * * 1"   # Cada lunes a las 2 AM UTC (Agente Auditor)
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - "governance/**"
      - "standards/**"
      - "config/**"
  workflow_dispatch:
    inputs:
      audit_type:
        description: "Type of audit to run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - security_only
          - compliance_only
          - standards_update

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  SOT_VERSION: "1.0.0"
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # JOB 1: AUDITORÍA DE CONFORMIDAD
  # ============================================================
  compliance_audit:
    name: "🔍 Compliance Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install dependencies"
        run: pip install pyyaml jsonschema

      - name: "Run compliance audit"
        id: audit
        run: |
          python3 - << 'PYEOF'
          import yaml
          import json
          import os
          import glob
          from datetime import datetime

          audit_result = {
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "repository": os.environ.get("GITHUB_REPOSITORY", "unknown"),
              "commit": os.environ.get("GITHUB_SHA", "unknown"),
              "source_of_truth_version": "1.0.0",
              "checks": [],
              "deviations": []
          }

          def add_check(name, category, passed, severity="medium", details="", file_path=""):
              audit_result["checks"].append({
                  "name": name,
                  "category": category,
                  "passed": passed,
                  "severity": severity,
                  "details": details,
                  "file_path": file_path
              })
              if not passed:
                  audit_result["deviations"].append({
                      "id": f"DEV-{datetime.utcnow().strftime('%Y%m%d')}-{len(audit_result['deviations'])+1:03d}",
                      "name": name,
                      "category": category,
                      "severity": severity,
                      "details": details,
                      "file_path": file_path
                  })

          # === CONFIG CHECKS ===
          # Check: source-of-truth.yml exists
          add_check(
              "source_of_truth_config_exists",
              "config",
              os.path.exists("config/source-of-truth.yml"),
              "high",
              "Main Source of Truth configuration file",
              "config/source-of-truth.yml"
          )

          # Check: behavior standard exists
          add_check(
              "behavior_standard_exists",
              "standards",
              os.path.exists("agents/behavior-standard.md"),
              "high",
              "Agent behavior standard document",
              "agents/behavior-standard.md"
          )

          # Check: validation schema exists
          add_check(
              "validation_schema_exists",
              "standards",
              os.path.exists("agents/evaluation/validation-schema.json"),
              "high",
              "Agent response validation schema",
              "agents/evaluation/validation-schema.json"
          )

          # Check: security policy exists
          add_check(
              "security_policy_exists",
              "security",
              os.path.exists("governance/security-policy.md"),
              "critical",
              "Security policy document",
              "governance/security-policy.md"
          )

          # Check: governance policies exist
          add_check(
              "governance_policies_exist",
              "governance",
              os.path.exists("governance/policies.md"),
              "high",
              "Governance policies document",
              "governance/policies.md"
          )

          # === WORKFLOW CHECKS ===
          workflows = glob.glob(".github/workflows/*.yml")
          add_check(
              "main_pipeline_exists",
              "pipeline",
              any("main-pipeline" in w for w in workflows),
              "critical",
              "Main pipeline workflow",
              ".github/workflows/main-pipeline.yml"
          )

          add_check(
              "agent_evaluator_exists",
              "pipeline",
              any("agent-evaluator" in w for w in workflows),
              "medium",
              "Agent evaluator workflow",
              ".github/workflows/agent-evaluator.yml"
          )

          add_check(
              "governance_workflow_exists",
              "governance",
              any("governance" in w for w in workflows),
              "medium",
              "Governance workflow",
              ".github/workflows/governance.yml"
          )

          # === WORKFLOW PERMISSION CHECKS ===
          for workflow_file in workflows:
              with open(workflow_file) as f:
                  try:
                      wf = yaml.safe_load(f)
                  except yaml.YAMLError:
                      continue
              if wf and "permissions" not in wf:
                  add_check(
                      f"workflow_has_permissions_{os.path.basename(workflow_file)}",
                      "security",
                      False,
                      "medium",
                      f"Workflow missing explicit permissions declaration",
                      workflow_file
                  )

          # === CALCULATE SCORE ===
          total = len(audit_result["checks"])
          passed = sum(1 for c in audit_result["checks"] if c["passed"])
          critical_failures = sum(1 for d in audit_result["deviations"] if d["severity"] == "critical")
          high_failures = sum(1 for d in audit_result["deviations"] if d["severity"] == "high")

          audit_result["summary"] = {
              "total_checks": total,
              "passed": passed,
              "failed": total - passed,
              "critical_deviations": critical_failures,
              "high_deviations": high_failures,
              "score": passed / total if total > 0 else 0,
              "compliant": critical_failures == 0 and (passed / total if total > 0 else 0) >= 0.90
          }

          os.makedirs("audit-reports", exist_ok=True)
          report_path = f"audit-reports/compliance-{datetime.utcnow().strftime('%Y%m%d-%H%M%S')}.json"
          with open(report_path, "w") as f:
              json.dump(audit_result, f, indent=2)

          # Print summary
          summary = audit_result["summary"]
          print(f"\n{'='*60}")
          print(f"📋 COMPLIANCE AUDIT REPORT")
          print(f"{'='*60}")
          print(f"Repository: {audit_result['repository']}")
          print(f"Timestamp: {audit_result['timestamp']}")
          print(f"")
          print(f"Total checks: {summary['total_checks']}")
          print(f"Passed: {summary['passed']}")
          print(f"Failed: {summary['failed']}")
          print(f"Score: {summary['score']:.1%}")
          print(f"")
          if audit_result["deviations"]:
              print(f"Deviations found: {len(audit_result['deviations'])}")
              for dev in audit_result["deviations"]:
                  icon = "🔴" if dev["severity"] == "critical" else "🟠" if dev["severity"] == "high" else "🟡"
                  print(f"  {icon} [{dev['severity'].upper()}] {dev['name']}: {dev['details']}")
          else:
              print("✅ No deviations found")

          print(f"\nOverall status: {'✅ COMPLIANT' if summary['compliant'] else '❌ NON-COMPLIANT'}")
          print(f"Report saved: {report_path}")
          PYEOF

      - name: "Upload audit report"
        uses: actions/upload-artifact@v4
        with:
          name: compliance-audit-report
          path: audit-reports/
          retention-days: 365
        if: always()

  # ============================================================
  # JOB 2: AUDITORÍA DE SEGURIDAD
  # ============================================================
  security_audit:
    name: "🔐 Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Secret scanning"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: "Validate workflow security"
        run: |
          python3 - << 'PYEOF'
          import yaml
          import glob
          import os

          issues = []

          for workflow_file in glob.glob(".github/workflows/*.yml"):
              with open(workflow_file) as f:
                  try:
                      wf = yaml.safe_load(f)
                  except yaml.YAMLError as e:
                      print(f"⚠️  Could not parse {workflow_file}: {e}")
                      continue

              if not wf:
                  continue

              filename = os.path.basename(workflow_file)

              # Check for permissions
              if "permissions" not in wf:
                  issues.append(f"⚠️  {filename}: No top-level permissions block (potential over-privilege)")

              # Check for pull_request_target with checkout (dangerous pattern)
              triggers = wf.get("on", {})
              if isinstance(triggers, dict) and "pull_request_target" in triggers:
                  for job_name, job in (wf.get("jobs", {}) or {}).items():
                      for step in (job.get("steps", []) or []):
                          uses = step.get("uses", "")
                          if "checkout" in uses:
                              issues.append(
                                  f"🔴 {filename}/jobs/{job_name}: "
                                  f"Dangerous pattern: checkout in pull_request_target"
                              )

          if issues:
              print("Security issues found in workflows:")
              for issue in issues:
                  print(f"  {issue}")
          else:
              print("✅ No security issues found in workflows")
          PYEOF

  # ============================================================
  # JOB 3: NOTIFICACIÓN DE CAMBIOS EN ESTÁNDARES
  # Solo se ejecuta cuando hay cambios en los estándares
  # ============================================================
  notify_standards_update:
    name: "📢 Notify Standards Update"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "Detect changed standards"
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^(agents/|governance/|standards/|config/)" || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then
            echo "Standards changed:"
            echo "$CHANGED"
          else
            echo "No standards changed in this commit"
          fi

      - name: "Create standards update issue"
        if: steps.changes.outputs.changed_files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = `${{ steps.changes.outputs.changed_files }}`.trim();
            if (!changedFiles) return;

            const body = [
              '## 📢 Standards Update Notification',
              '',
              `**Commit:** ${context.sha.substring(0, 7)}`,
              `**Actor:** @${context.actor}`,
              `**Timestamp:** ${new Date().toISOString()}`,
              '',
              '### Changed files:',
              changedFiles.split('\n').map(f => `- \`${f}\``).join('\n'),
              '',
              '### Action required:',
              'All linked repositories should review these changes and update their',
              'conformance configuration (`.source-of-truth.yml`) if necessary.',
              '',
              '**Migration deadline:** 30 days from this notification.',
              '',
              '---',
              '_This issue was created automatically by the Governance workflow._'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Standards Update] ${new Date().toISOString().split('T')[0]} — ${changedFiles.split('\n').length} file(s) changed`,
              body: body,
              labels: ['standards-update', 'governance']
            });

  # ============================================================
  # JOB 4: GENERAR REPORTE DE GOBERNANZA
  # ============================================================
  governance_report:
    name: "📊 Governance Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [compliance_audit, security_audit]
    if: always()

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Generate governance summary"
        run: |
          python3 - << 'PYEOF'
          import os
          import json
          from datetime import datetime

          report = {
              "report_type": "governance_summary",
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "repository": os.environ.get("GITHUB_REPOSITORY", "unknown"),
              "run_id": os.environ.get("GITHUB_RUN_ID", "unknown"),
              "source_of_truth_version": "1.0.0",
              "pipeline_jobs": {
                  "compliance_audit": os.environ.get("COMPLIANCE_STATUS", "unknown"),
                  "security_audit": os.environ.get("SECURITY_STATUS", "unknown"),
              },
              "next_scheduled_audit": "Next Monday at 02:00 UTC"
          }

          os.makedirs("governance-reports", exist_ok=True)
          with open("governance-reports/summary.json", "w") as f:
              json.dump(report, f, indent=2)

          print(json.dumps(report, indent=2))
          PYEOF

      - name: "Upload governance report"
        uses: actions/upload-artifact@v4
        with:
          name: governance-report
          path: governance-reports/
          retention-days: 365
        if: always()
